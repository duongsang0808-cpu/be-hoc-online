<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bé Dương Bảo Khánh</title>

<link href="https://fonts.googleapis.com/css2?family=Andika:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Andika',sans-serif;
background:#f3a6a6;
text-align:center;
margin:0;
}

h1{
margin-top:20px;
font-size:40px;
}

#score{
font-size:24px;
margin:10px;
}

.menu{
background:white;
margin:20px auto;
padding:30px;
border-radius:20px;
width:80%;
}

button{
font-family:'Andika';
font-size:28px;
padding:15px 25px;
margin:10px;
border:none;
border-radius:15px;
background:#6c63ff;
color:white;
cursor:pointer;
}

button:hover{
background:#4f47e5;
}

#game{
margin-top:30px;
}

.option{
font-size:40px;
margin:10px;
padding:20px;
width:100px;
background:white;
border-radius:15px;
display:inline-block;
cursor:pointer;
}

.question{
font-size:38px;
margin:20px;
}

.star{
font-size:120px;
color:gold;
display:none;
}

</style>
</head>

<body>

<h1>🎓 Bé Dương Bảo Khánh</h1>
<div id="score">⭐ Điểm: 0</div>

<div class="menu">

<button onclick="startAnimal()">🐶 Đếm con vật</button>
<button onclick="startSpell()">🔤 Đánh vần</button>
<button onclick="startMissing()">🧩 Chữ còn thiếu</button>
<button onclick="startLetter()">🧠 Nhận diện chữ</button>

</div>

<div id="game"></div>
<div class="star" id="star">⭐</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3e7d6e9f5e.mp3">
</audio>

<script>

let score=0
let streak=0

const animals=["🐱","🐶","🐟","🐔","🚗"]

const letters=[
"a","ă","â","b","c","d","đ","e","ê",
"g","h","i","k","l","m","n","o","ô","ơ",
"p","q","r","s","t","u","ư","v","x","y"
]

const words=[
"ba","bà","bá","bé","bò","cá","cô","cờ","mẹ","xe",
"gà","cá","mèo","bê","cá","cô","cò","cua","sò","tô"
]

function speak(text){
let msg=new SpeechSynthesisUtterance(text)
msg.lang="vi-VN"
speechSynthesis.speak(msg)
}

function updateScore(){
document.getElementById("score").innerText="⭐ Điểm: "+score
}

function correct(){

score++
streak++

updateScore()

if(streak>=5){
showStar()
streak=0
}
}

function showStar(){

let star=document.getElementById("star")
star.style.display="block"

speak("Giỏi lắm Bảo Khánh")

setTimeout(()=>{
star.style.display="none"
},3000)

}

function wrong(){
streak=0
}

function random(a){
return a[Math.floor(Math.random()*a.length)]
}

function startAnimal(){

let game=document.getElementById("game")

let animal=random(animals)
let count=Math.floor(Math.random()*4)+1

let html="<div class='question'>Có bao nhiêu "+animal+"?</div>"

for(let i=0;i<count;i++) html+=animal+" "

html+="<br><br>"

for(let i=1;i<=5;i++){
html+="<div class='option' onclick='answerAnimal("+i+","+count+")'>"+i+"</div>"
}

game.innerHTML=html

speak("có bao nhiêu con")

}

function answerAnimal(a,b){
if(a==b){
correct()
}else{
wrong()
}
setTimeout(startAnimal,800)
}

function startSpell(){

let game=document.getElementById("game")

let word=random(words)

let answers=[word]

while(answers.length<3){
let w=random(words)
if(!answers.includes(w)) answers.push(w)
}

answers.sort(()=>Math.random()-0.5)

let html="<div class='question'>Nghe và chọn đúng</div>"

answers.forEach(a=>{
html+="<div class='option' onclick='answerSpell(\""+a+"\",\""+word+"\")'>"+a+"</div>"
})

game.innerHTML=html

speak(word)

}

function answerSpell(a,b){
if(a==b){
correct()
}else{
wrong()
}
setTimeout(startSpell,800)
}

function startMissing(){

let game=document.getElementById("game")

let word=random(words)

let missing=word[1]

let show=word[0]+" _"

let answers=[missing]

while(answers.length<3){
let l=random(letters)
if(!answers.includes(l)) answers.push(l)
}

answers.sort(()=>Math.random()-0.5)

let html="<div class='question'>"+show+"</div>"

answers.forEach(a=>{
html+="<div class='option' onclick='answerMissing(\""+a+"\",\""+missing+"\")'>"+a+"</div>"
})

game.innerHTML=html

speak(word)

}

function answerMissing(a,b){
if(a==b){
correct()
}else{
wrong()
}
setTimeout(startMissing,800)
}

function startLetter(){

let game=document.getElementById("game")

let letter=random(letters)

let answers=[letter]

while(answers.length<4){
let l=random(letters)
if(!answers.includes(l)) answers.push(l)
}

answers.sort(()=>Math.random()-0.5)

let html=""

answers.forEach(a=>{
html+="<div class='option' onclick='answerLetter(\""+a+"\",\""+letter+"\")'>"+a+"</div>"
})

game.innerHTML=html

speak("đâu là chữ "+letter)

}

function answerLetter(a,b){
if(a==b){
correct()
}else{
wrong()
}
setTimeout(startLetter,800)
}

window.onload=function(){

speak("chào mừng bé Dương Bảo Khánh")

let music=document.getElementById("music")

setTimeout(()=>{
music.volume=0.15
music.play()
},2000)

}

</script>

</body>
</html>
