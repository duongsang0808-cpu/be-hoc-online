<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bé Học Online</title>

<style>

body{
font-family:Arial;
background:#f2f4f8;
text-align:center;
padding:20px;
}

.header{
background:linear-gradient(45deg,#6a5af9,#2ec9b0);
color:white;
padding:30px;
border-radius:20px;
font-size:28px;
font-weight:bold;
}

.score{
margin-top:10px;
background:white;
display:inline-block;
padding:10px 25px;
border-radius:20px;
font-size:20px;
}

.card{
background:white;
padding:25px;
border-radius:20px;
margin-top:25px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

button{
font-size:24px;
padding:15px 25px;
margin:10px;
border:none;
border-radius:15px;
background:#ff6b9a;
color:white;
cursor:pointer;
}

button:hover{
background:#ff4c82;
}

.question{
font-size:28px;
margin-bottom:20px;
}

.emoji{
font-size:40px;
}

</style>
</head>

<body>

<div class="header">
Chào mừng bé <span style="white-space:nowrap;">Dương Bảo Khánh</span> 💙
<div class="score">⭐ Điểm: <span id="score">0</span></div>
</div>

<div class="card">

<div id="question" class="question"></div>

<div id="emoji"></div>

<div id="answers"></div>

</div>

<script>

let score=0

function updateScore(){
document.getElementById("score").innerText=score
}

function speak(text){

window.speechSynthesis.cancel()

let msg=new SpeechSynthesisUtterance(text)

msg.lang="vi-VN"

msg.rate=0.9

speechSynthesis.speak(msg)

}

function clap(){

let audio=new Audio("https://www.soundjay.com/human/applause-8.mp3")

audio.play()

}

function firework(){

for(let i=0;i<20;i++){

let div=document.createElement("div")

div.innerHTML="🎉"

div.style.position="fixed"

div.style.left=Math.random()*100+"%"

div.style.top=Math.random()*100+"%"

div.style.fontSize="30px"

document.body.appendChild(div)

setTimeout(()=>div.remove(),1000)

}

}

function nextQuestion(){

let type=Math.floor(Math.random()*3)

if(type==0) countQuestion()
if(type==1) compareQuestion()
if(type==2) mathQuestion()

}

function countQuestion(){

let number=Math.floor(Math.random()*5)+1

let emoji="🚗"

let html=""

for(let i=0;i<number;i++){

html+=emoji+" "

}

document.getElementById("emoji").innerHTML=html

document.getElementById("question").innerText="Có bao nhiêu chiếc xe ô tô?"

speak("Có bao nhiêu chiếc xe ô tô")

let answers=""

for(let i=1;i<=5;i++){

answers+=`<button onclick="check(${i},${number})">${i}</button>`

}

document.getElementById("answers").innerHTML=answers

}

function compareQuestion(){

let a=Math.floor(Math.random()*10)

let b=Math.floor(Math.random()*10)

document.getElementById("emoji").innerHTML=a+" ? "+b

document.getElementById("question").innerText="Chọn dấu đúng"

speak("So sánh hai số")

document.getElementById("answers").innerHTML=`

<button onclick="checkSign('>',${a},${b})">></button>

<button onclick="checkSign('<',${a},${b})"><</button>

<button onclick="checkSign('=',${a},${b})">=</button>

`

}

function mathQuestion(){

let a=Math.floor(Math.random()*10)

let b=Math.floor(Math.random()*10)

let correct=a+b

document.getElementById("emoji").innerHTML=a+" + "+b

document.getElementById("question").innerText="Tính phép cộng"

speak(a+" cộng "+b+" bằng bao nhiêu")

let answers=""

for(let i=0;i<4;i++){

let num=Math.floor(Math.random()*20)

answers+=`<button onclick="check(${num},${correct})">${num}</button>`

}

answers+=`<button onclick="check(${correct},${correct})">${correct}</button>`

document.getElementById("answers").innerHTML=answers

}

function check(ans,correct){

if(ans==correct){

score++

updateScore()

clap()

firework()

setTimeout(nextQuestion,800)

}else{

alert("Sai rồi, thử lại nha")

}

}

function checkSign(sign,a,b){

let correct="="

if(a>b) correct=">"

if(a<b) correct="<"

if(sign==correct){

score++

updateScore()

clap()

firework()

setTimeout(nextQuestion,800)

}else{

alert("Sai rồi")

}

}

nextQuestion()

</script>

</body>
</html>
