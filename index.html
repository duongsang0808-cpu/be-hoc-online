<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bé Dương Bảo Khánh</title>

<style>

body{
font-family:Arial;
background:#f4a7a3;
margin:0;
padding:20px;
text-align:center;
}

.title{
font-size:32px;
font-weight:bold;
}

.score{
background:white;
display:inline-block;
padding:10px 20px;
border-radius:20px;
margin-top:10px;
font-size:20px;
}

.card{
background:#eee;
padding:30px;
border-radius:30px;
max-width:700px;
margin:auto;
margin-top:30px;
}

button{
font-size:20px;
padding:12px 20px;
margin:8px;
border:none;
border-radius:14px;
background:#6c5ce7;
color:white;
cursor:pointer;
}

button:hover{
background:#5848d6;
}

.question{
font-size:28px;
margin-bottom:15px;
}

.emoji{
font-size:60px;
margin-bottom:15px;
}

</style>

</head>

<body>

<div class="title">🎓 Bé Dương Bảo Khánh</div>

<div class="score">⭐ Điểm: <span id="score">0</span></div>

<div class="card">

<div>

<button onclick="startAnimal()">🐶 Đếm con vật</button> <button onclick="startMath()">➕➖ Toán</button> <button onclick="startCompare()">🔢 So sánh</button>

<br>

<button onclick="startSpell()">🔤 Đánh vần</button> <button onclick="startMissing()">🧩 Chữ còn thiếu</button>

<br>

<button onclick="startLetter()">🧠 Nhận diện chữ</button>

</div>

<div id="game"></div>

</div>

<script>

let score=0;
let currentGame="";

function speak(t){

speechSynthesis.cancel();

let msg=new SpeechSynthesisUtterance(t);

msg.lang="vi-VN";

speechSynthesis.speak(msg);

}

function clap(){

let audio=new Audio("https://www.soundjay.com/human/applause-8.mp3");

audio.play();

}

function firework(){

for(let i=0;i<30;i++){

let d=document.createElement("div");

d.innerHTML="🎆";

d.style.position="fixed";

d.style.left=Math.random()*100+"%";

d.style.top=Math.random()*100+"%";

d.style.fontSize="30px";

document.body.appendChild(d);

setTimeout(()=>d.remove(),1000);

}

}

function correct(){

score++;

document.getElementById("score").innerText=score;

speak("Bảo Khánh giỏi quá");

clap();

firework();

}

function wrong(){

speak("Sai rồi thử lại con nhé");

}

function check(a,b){

if(a==b){

correct();

}else{

wrong();

}

}

function startAnimal(){

currentGame="animal";

let n=Math.floor(Math.random()*5)+1;

let html="";

for(let i=0;i<n;i++){

html+="🐶 ";

}

document.getElementById("game").innerHTML=

'<div class="question">Có bao nhiêu con?</div>'+
'<div class="emoji">'+html+'</div>'+
'<button onclick="check('+n+','+n+')">'+n+'</button>'+
'<button onclick="check('+(n+1)+','+n+')">'+(n+1)+'</button>'+
'<button onclick="check('+(n-1)+','+n+')">'+(n-1)+'</button>';

speak("Có bao nhiêu con");

}

function startMath(){

currentGame="math";

let a=Math.floor(Math.random()*10);

let b=Math.floor(Math.random()*10);

let c=a+b;

document.getElementById("game").innerHTML=

'<div class="question">'+a+' + '+b+'</div>'+

'<button onclick="check('+c+','+c+')">'+c+'</button>'+

'<button onclick="check('+(c+1)+','+c+')">'+(c+1)+'</button>'+

'<button onclick="check('+(c-1)+','+c+')">'+(c-1)+'</button>';

speak(a+" cộng "+b);

}

function startCompare(){

currentGame="compare";

let a=Math.floor(Math.random()*20);

let b=Math.floor(Math.random()*20);

document.getElementById("game").innerHTML=

'<div class="question">'+a+' ? '+b+'</div>'+

'<button onclick="checkSign(\'>\','+a+','+b+')">></button>'+

'<button onclick="checkSign(\'<\','+a+','+b+')"><</button>'+

'<button onclick="checkSign(\'=\','+a+','+b+')">=</button>';

speak("So sánh hai số");

}

function checkSign(s,a,b){

let r="=";

if(a>b) r=">";

if(a<b) r="<";

if(s==r){

correct();

}else{

wrong();

}

}

function startSpell(){

currentGame="spell";

let words=[

["BA","bờ a ba"],

["BÁ","bờ a ba sắc bá"],

["CA","cờ a ca"],

["MA","mờ a ma"],

["MẸ","mờ e me nặng mẹ"],

["LY","lờ y ly"],

["CÔ","cờ ô cô"],

["HỒ","hờ ô hô huyền hồ"],

["ĐI","đờ i đi"],

["XA","xờ a xa"]

];

let w=words[Math.floor(Math.random()*words.length)];

let correct=w[0];

let options=["BA","CA","MA","LY"];

options.sort(()=>Math.random()-0.5);

document.getElementById("game").innerHTML=

'<div class="question">Nghe và chọn chữ đúng</div>'+

'<div class="emoji">🔊</div>'+

'<button onclick="checkWord(\''+options[0]+'\',\''+correct+'\')">'+options[0]+'</button>'+

'<button onclick="checkWord(\''+options[1]+'\',\''+correct+'\')">'+options[1]+'</button>'+

'<button onclick="checkWord(\''+options[2]+'\',\''+correct+'\')">'+options[2]+'</button>'+

'<button onclick="checkWord(\''+options[3]+'\',\''+correct+'\')">'+options[3]+'</button>';

speak(w[1]);

}

function checkWord(a,b){

if(a==b){

correct();

}else{

wrong();

}

}

function startMissing(){

currentGame="missing";

let words=[["B_","A"],["M_","E"],["L_","Y"],["C_","Ô"]];

let w=words[Math.floor(Math.random()*words.length)];

document.getElementById("game").innerHTML=

'<div class="question">Chữ còn thiếu</div>'+

'<div class="emoji">'+w[0]+'</div>'+

'<button onclick="check(\''+w[1]+'\',\''+w[1]+'\')">'+w[1]+'</button>'+

'<button onclick="check(\'A\',\''+w[1]+'\')">A</button>'+

'<button onclick="check(\'E\',\''+w[1]+'\')">E</button>';

}

function startLetter(){

currentGame="letter";

let letters=["a","ă","â"];

let correct=letters[Math.floor(Math.random()*letters.length)];

document.getElementById("game").innerHTML=

'<div class="question">Đâu là chữ '+correct+'?</div>'+

'<button onclick="check(\''+correct+'\',\'a\')">a</button>'+

'<button onclick="check(\''+correct+'\',\'ă\')">ă</button>'+

'<button onclick="check(\''+correct+'\',\'â\')">â</button>';

speak("Đâu là chữ "+correct);

}

</script>

</body>
</html>
