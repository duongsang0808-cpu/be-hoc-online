<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bé Bảo Khánh Học Thông Minh</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#6a5af9,#2ec9b0);
margin:0;
padding:20px;
text-align:center;
color:white;
}

.title{
font-size:34px;
font-weight:bold;
}

.score{
background:white;
color:black;
display:inline-block;
padding:10px 20px;
border-radius:20px;
margin-top:10px;
font-size:20px;
}

.card{
background:white;
color:black;
padding:25px;
border-radius:25px;
max-width:550px;
margin:auto;
margin-top:25px;
}

.question{
font-size:28px;
margin-bottom:15px;
}

.emoji{
font-size:50px;
margin-bottom:20px;
}

button{
font-size:22px;
padding:14px 24px;
margin:8px;
border:none;
border-radius:15px;
background:#ff6b9a;
color:white;
cursor:pointer;
}

button:hover{
background:#ff4c82;
}

.menu button{
background:#6a5af9;
}

</style>

</head>

<body>

<div class="title">🎓 Bé Dương Bảo Khánh Học Bài</div>

<div class="score">⭐ Điểm: <span id="score">0</span></div>

<div class="card">

<div class="menu">

<button onclick="startAnimal()">🐶 Đếm con vật</button>
<button onclick="startFruit()">🍎 Đếm trái cây</button>
<button onclick="startCar()">🚗 Đếm xe</button>
<button onclick="startMath()">➕ Toán học</button>
<button onclick="startCompare()">🔢 So sánh</button>
<button onclick="startSpell()">🔤 Học đánh vần</button>

</div>

<div id="game"></div>

</div>

<script>

let score=0
let currentGame=""

function updateScore(){
document.getElementById("score").innerText=score
}

function speak(text){

speechSynthesis.cancel()

let msg=new SpeechSynthesisUtterance(text)

msg.lang="vi-VN"
msg.rate=0.9

speechSynthesis.speak(msg)

}

function clap(){

let audio=new Audio("https://www.soundjay.com/human/applause-8.mp3")

audio.play()

}

function firework(){

for(let i=0;i<30;i++){

let div=document.createElement("div")

div.innerHTML="🎆"

div.style.position="fixed"
div.style.left=Math.random()*100+"%"
div.style.top=Math.random()*100+"%"
div.style.fontSize="30px"

document.body.appendChild(div)

setTimeout(()=>div.remove(),1200)

}

}

function praise(){

let praises=[
"Con giỏi quá",
"Bảo Khánh giỏi quá",
"Giỏi lắm",
"Chính xác",
"Tuyệt vời"
]

let say=praises[Math.floor(Math.random()*praises.length)]

speak(say)

}

function correct(){

praise()

score++
updateScore()

clap()
firework()

setTimeout(()=>{

if(currentGame=="animal") startAnimal()
if(currentGame=="fruit") startFruit()
if(currentGame=="car") startCar()
if(currentGame=="math") startMath()
if(currentGame=="compare") startCompare()
if(currentGame=="spell") startSpell()

},1200)

}

function wrong(){
speak("Sai rồi, thử lại con nhé")
}

function createCountGame(list,name){

let number=Math.floor(Math.random()*5)+1

let item=list[Math.floor(Math.random()*list.length)]

let html=""

for(let i=0;i<number;i++) html+=item+" "

document.getElementById("game").innerHTML=`

<div class="question">Có bao nhiêu ${name}?</div>

<div class="emoji">${html}</div>

<div>
<button onclick="check(${number},${number})">${number}</button>
<button onclick="check(${number+1},${number})">${number+1}</button>
<button onclick="check(${number-1},${number})">${number-1}</button>
</div>

`

speak("Có bao nhiêu "+name)

}

function startAnimal(){
currentGame="animal"
createCountGame(["🐶","🐱","🐰","🐼"],"con")
}

function startFruit(){
currentGame="fruit"
createCountGame(["🍎","🍊","🍌","🍉"],"trái cây")
}

function startCar(){
currentGame="car"
createCountGame(["🚗","🚕","🚙","🚌"],"xe")
}

function startMath(){

currentGame="math"

let a=Math.floor(Math.random()*10)
let b=Math.floor(Math.random()*10)

let correctAns=a+b

document.getElementById("game").innerHTML=`

<div class="question">Tính phép cộng</div>

<div class="emoji">${a} + ${b}</div>

<div>
<button onclick="check(${correctAns},${correctAns})">${correctAns}</button>
<button onclick="check(${correctAns+1},${correctAns})">${correctAns+1}</button>
<button onclick="check(${correctAns-1},${correctAns})">${correctAns-1}</button>
</div>

`

speak(a+" cộng "+b+" bằng bao nhiêu")

}

function startCompare(){

currentGame="compare"

let a=Math.floor(Math.random()*20)
let b=Math.floor(Math.random()*20)

document.getElementById("game").innerHTML=`

<div class="question">Chọn dấu đúng</div>

<div class="emoji">${a} ? ${b}</div>

<div>
<button onclick="checkSign('>',${a},${b})">></button>
<button onclick="checkSign('<',${a},${b})"><</button>
<button onclick="checkSign('=',${a},${b})">=</button>
</div>

`

speak("So sánh hai số")

}

function startSpell(){

currentGame="spell"

let words=[
["BA","BA"],
["BÀ","BA HUYỀN"],
["BÁ","BA SẮC"],
["BẠ","BA NẶNG"],
["BẢ","BA HỎI"],
["BÃ","BA NGÃ"]
]

let w=words[Math.floor(Math.random()*words.length)]

document.getElementById("game").innerHTML=`

<div class="question">Chọn chữ đúng</div>

<div class="emoji">${w[0]}</div>

<div>
<button onclick="checkWord('${w[0]}','${w[0]}')">${w[0]}</button>
<button onclick="checkWord('CA','${w[0]}')">CA</button>
<button onclick="checkWord('DA','${w[0]}')">DA</button>
</div>

`

speak("Chữ "+w[0])

}

function check(ans,correctAns){

if(ans==correctAns) correct()
else wrong()

}

function checkWord(ans,correctAns){

if(ans==correctAns) correct()
else wrong()

}

function checkSign(sign,a,b){

let correctSign="="

if(a>b) correctSign=">"
if(a<b) correctSign="<"

if(sign==correctSign) correct()
else wrong()

}

</script>

</body>
</html>
