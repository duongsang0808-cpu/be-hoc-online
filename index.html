<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bé Bảo Khánh Học Vui</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
margin:0;
padding:20px;
}

.title{
font-size:34px;
font-weight:bold;
color:#333;
}

.score{
background:#fff;
display:inline-block;
padding:10px 20px;
border-radius:20px;
font-size:20px;
margin-top:10px;
}

.card{
background:white;
padding:25px;
border-radius:25px;
max-width:650px;
margin:auto;
margin-top:25px;
}

button{
font-size:22px;
padding:14px 22px;
margin:8px;
border:none;
border-radius:15px;
background:#ff6b9a;
color:white;
cursor:pointer;
}

button:hover{
background:#ff4c82;
}

.menu button{
background:#6a5af9;
}

.question{
font-size:28px;
margin-bottom:15px;
}

.emoji{
font-size:60px;
margin-bottom:15px;
}

</style>

</head>

<body>

<div class="title">🎓 Bé Dương Bảo Khánh</div>

<div class="score">⭐ Điểm: <span id="score">0</span></div>

<div class="card">

<div class="menu">

<button onclick="startAnimal()">🐶 Đếm con vật</button> <button onclick="startMath()">➕➖ Toán</button> <button onclick="startCompare()">🔢 So sánh</button> <button onclick="startSpell()">🔤 Đánh vần</button> <button onclick="startMissing()">🧩 Chữ còn thiếu</button> <button onclick="startLetter()">🧠 Nhận diện chữ</button>

</div>

<div id="game"></div>

</div>

<script>

let score=0
let currentGame=""

function speak(t){
speechSynthesis.cancel()
let msg=new SpeechSynthesisUtterance(t)
msg.lang="vi-VN"
speechSynthesis.speak(msg)
}

function clap(){
let audio=new Audio("https://www.soundjay.com/human/applause-8.mp3")
audio.play()
}

function firework(){

for(let i=0;i<40;i++){

let d=document.createElement("div")

d.innerHTML="🎆"
d.style.position="fixed"
d.style.left=Math.random()*100+"%"
d.style.top=Math.random()*100+"%"
d.style.fontSize="32px"

document.body.appendChild(d)

setTimeout(()=>d.remove(),1000)

}

}

function praise(){

let arr=["Bảo Khánh giỏi quá","Con giỏi quá","Giỏi lắm"]

let s=arr[Math.floor(Math.random()*arr.length)]

speak(s)

}

function correct(){

score++
document.getElementById("score").innerText=score

praise()
clap()
firework()

setTimeout(()=>{

if(currentGame=="animal") startAnimal()
if(currentGame=="math") startMath()
if(currentGame=="compare") startCompare()
if(currentGame=="spell") startSpell()
if(currentGame=="missing") startMissing()
if(currentGame=="letter") startLetter()

},1200)

}

function wrong(){
speak("Sai rồi thử lại con nhé")
}

function check(a,b){
if(a==b) correct()
else wrong()
}

function startAnimal(){

currentGame="animal"

let n=Math.floor(Math.random()*5)+1

let html=""

for(let i=0;i<n;i++) html+="🐶 "

document.getElementById("game").innerHTML=`

<div class="question">Có bao nhiêu con?</div>

<div class="emoji">${html}</div>

<button onclick="check(${n},${n})">${n}</button>
<button onclick="check(${n+1},${n})">${n+1}</button>
<button onclick="check(${n-1},${n})">${n-1}</button>

`

speak("Có bao nhiêu con")

}

function startMath(){

currentGame="math"

let a=Math.floor(Math.random()*10)
let b=Math.floor(Math.random()*10)

let c=a+b

document.getElementById("game").innerHTML=`

<div class="question">${a} + ${b}</div>

<button onclick="check(${c},${c})">${c}</button>
<button onclick="check(${c+1},${c})">${c+1}</button>
<button onclick="check(${c-1},${c})">${c-1}</button>

`

speak(a+" cộng "+b)

}

function startCompare(){

currentGame="compare"

let a=Math.floor(Math.random()*20)
let b=Math.floor(Math.random()*20)

document.getElementById("game").innerHTML=`

<div class="question">${a} ? ${b}</div>

<button onclick="checkSign('>',${a},${b})">></button>
<button onclick="checkSign('<',${a},${b})"><</button>
<button onclick="checkSign('=',${a},${b})">=</button>

`

speak("So sánh hai số")

}

function checkSign(s,a,b){

let r="="

if(a>b) r=">"
if(a<b) r="<"

if(s==r) correct()
else wrong()

}

function startSpell(){

currentGame="spell"

let words=[

["BA","bờ a ba"],
["BÁ","bờ a ba sắc bá"],
["CA","cờ a ca"],
["MA","mờ a ma"],
["MẸ","mờ e me nặng mẹ"],
["LY","lờ]()
