<!DOCTYPE html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hل»چc cأ¹ng Bل؛£o Khأ،nh 2.0</title>
<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,#5f8dff,#00d2a8);} 
.container{max-width:500px;margin:auto;padding:15px}
.header{background:linear-gradient(135deg,#6a8dff,#00c9a7);color:white;padding:25px 15px;border-radius:25px;text-align:center;box-shadow:0 10px 25px rgba(0,0,0,0.2)}
.header h1{font-size:20px;white-space:nowrap;margin:0 0 15px 0}

.card{background:white;border-radius:20px;padding:20px;margin-top:20px;box-shadow:0 8px 20px rgba(0,0,0,0.15);text-align:center}
.menu-btn{width:100%;padding:18px;margin:10px 0;border:none;border-radius:18px;font-size:20px;font-weight:bold;cursor:pointer;background:#f2f2f2}
.menu-btn:hover{background:#e6e6e6}

</style>
</head>
<body>
<canvas id="fireworks"></canvas>
<div class="container">
<div class="header">
<h1>Chأ o mل»«ng bأ© Dئ°ئ،ng Bل؛£o Khأ،nh ًں’™</h1>
<div class="score">â­گ ؤگiل»ƒm: <span id="score">0</span></div>
</div>

<div id="menu" class="card">
<button class="menu-btn" onclick="startCounting()">ًںڑ— Tل؛­p ؤگل؛؟m</button>
<button class="menu-btn" onclick="startCompare()">ًں”¢ So Sأ،nh > < =</button>
<button class="menu-btn" onclick="startMath()">â‍• Cل»™ng Trل»« (0-20)</button>
<button class="menu-btn" onclick="startVietnamese()">ًں”¤ Hل»چc Chل»¯ & ؤگأ،nh Vل؛§n</button>
</div>

<div id="game" class="card hidden"></div>
</div>

<script>
let score=0;
const game=document.getElementById('game');
const menu=document.getElementById('menu');
const scoreEl=document.getElementById('score');

function speak(text){let msg=new SpeechSynthesisUtterance(text);msg.lang='vi-VN';speechSynthesis.speak(msg)}

function cheerSound(){const ctx=new (window.AudioContext||window.webkitAudioContext)();let osc=ctx.createOscillator();let gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.type='triangle';osc.frequency.value=500;gain.gain.value=0.2;osc.start();osc.frequency.exponentialRampToValueAtTime(1000,ctx.currentTime+0.3);osc.stop(ctx.currentTime+0.3)}

function addScore(){score++;scoreEl.innerText=score;cheerSound();launchFireworks();}

function backMenu(){game.classList.add('hidden');menu.classList.remove('hidden');}

function startCounting(){menu.classList.add('hidden');game.classList.remove('hidden');let num=Math.floor(Math.random()*10)+1;let emojis='ًںڑ—'.repeat(num);let options=[num,num+1,num-1].sort(()=>Math.random()-0.5);
 game.innerHTML=`<div class='big'>${emojis}</div><div>Cأ³ bao nhiأھu chiل؛؟c xe?</div>`;
 speak('Cأ³ bao nhiأھu chiل؛؟c xe?');
 options.forEach(o=>{
 let btn=document.createElement('button');btn.className='option';btn.innerText=o;
 btn.onclick=()=>{if(o===num){addScore();speak('Giل»ڈi lل؛¯m Bل؛£o Khأ،nh');}else{speak('Thل»­ lل؛،i nhأ©');}startCounting()};
 game.appendChild(btn);
 });
 addBack();}

function startCompare(){menu.classList.add('hidden');game.classList.remove('hidden');let a=Math.floor(Math.random()*50);let b=Math.floor(Math.random()*50);
 game.innerHTML=`<div class='big'>${a} ? ${b}</div><div>Chل»چn dل؛¥u ؤ‘أ؛ng</div>`;
 speak(`So sأ،nh ${a} vأ  ${b}`);
 ['>','<','='].forEach(sign=>{
 let btn=document.createElement('button');btn.className='option';btn.innerText=sign;
 btn.onclick=()=>{if((a>b&&sign==='>')||(a<b&&sign==='<')||(a===b&&sign==='=')){addScore();speak('ؤگأ؛ng rل»“i');}else{speak('Sai rل»“i');}startCompare()};
 game.appendChild(btn);
 });
 addBack();}

function startMath(){menu.classList.add('hidden');game.classList.remove('hidden');let a=Math.floor(Math.random()*20);let b=Math.floor(Math.random()*20);let plus=Math.random()>0.5;let result=plus?a+b:a-b;if(result<0||result>20){startMath();return}
 game.innerHTML=`<div class='big'>${a} ${plus?'+':'-'} ${b} = ?</div>`;
 speak(`${a} ${plus?'cل»™ng':'trل»«'} ${b} bل؛±ng bao nhiأھu`);
 let options=[result,result+1,result-1].sort(()=>Math.random()-0.5);
 options.forEach(o=>{
 let btn=document.createElement('button');btn.className='option';btn.innerText=o;
 btn.onclick=()=>{if(o===result){addScore();speak('Chأ­nh xأ،c');}else{speak('Chئ°a ؤ‘أ؛ng');}startMath()};
 game.appendChild(btn);
 });
 addBack();}

function startVietnamese(){menu.classList.add('hidden');game.classList.remove('hidden');let letters=['A','ؤ‚','أ‚','B','C','D','ؤگ','E','أٹ','G','H','I','K','L','M','N','O','أ”','ئ ','P','Q','R','S','T','U','ئ¯','V','X','Y'];
 let correct=letters[Math.floor(Math.random()*letters.length)];
 game.innerHTML=`<div class='big'>Chل»چn chل»¯: ${correct}</div>`;
 speak(`Chل»چn chل»¯ ${correct}`);
 letters.sort(()=>Math.random()-0.5).slice(0,6).forEach(l=>{
 let btn=document.createElement('button');btn.className='option';btn.innerText=l;
 btn.onclick=()=>{if(l===correct){addScore();speak('Giل»ڈi lل؛¯m');}else{speak('Sai rل»“i');}startVietnamese()};
 game.appendChild(btn);
 });
 addBack();}

function addBack(){let back=document.createElement('button');back.className='option back';back.innerText='â¬… Quay lل؛،i';back.onclick=backMenu;game.appendChild(back)}

// Fireworks
const canvas=document.getElementById('fireworks');
const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;
function launchFireworks(){for(let i=0;i<30;i++){setTimeout(()=>{
 let x=Math.random()*canvas.width;
 let y=Math.random()*canvas.height/2;
 let radius=Math.random()*4+2;
 ctx.beginPath();ctx.arc(x,y,radius,0,Math.PI*2);
 ctx.fillStyle=`hsl(${Math.random()*360},100%,50%)`;
 ctx.fill();
 setTimeout(()=>ctx.clearRect(0,0,canvas.width,canvas.height),500);
 },i*20)}}
</script>
</body>
</html>
