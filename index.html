<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bé Học Thông Minh</title>
<style>
body{margin:0;font-family:Arial;background:#f2f6ff}
.app{max-width:520px;margin:auto;padding:15px}
.header{background:linear-gradient(135deg,#6c5ce7,#00cec9);color:white;padding:20px;border-radius:0 0 25px 25px;text-align:center}
.score{margin-top:10px;background:white;color:#333;display:inline-block;padding:6px 16px;border-radius:20px;font-weight:bold}
.card{background:white;margin:15px 0;padding:15px;border-radius:20px;box-shadow:0 5px 15px rgba(0,0,0,0.08)}
.question{font-size:20px;margin-bottom:10px}
.big-emoji{font-size:32px;margin:10px 0}
button{padding:12px 16px;margin:6px;font-size:18px;border:none;border-radius:15px;cursor:pointer;transition:.2s}
button:active{transform:scale(.9)}
.option{background:#74b9ff;color:white}
.correct{background:#00b894!important;color:white}
.wrong{background:#d63031!important;color:white}
.compare-btn{background:#fd79a8;color:white;font-size:22px}
#fireworks{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;font-size:28px;display:none;text-align:center;margin-top:40%}
</style>
</head>
<body>
<div class="app">
<div class="header">
<h2>Chào mừng bé Dương Bảo Khánh 💙</h2>
<div class="score">⭐ Điểm: <span id="score">0</span></div>
</div>

<div id="fireworks">🎆✨🎉🎇🎆✨🎉🎇</div>

<div class="card">
<h3>🚗 Tập Đếm</h3>
<div id="countQuestion" class="big-emoji"></div>
<div id="countOptions"></div>
</div>

<div class="card">
<h3>🔢 So Sánh > < =</h3>
<div id="compareQuestion" class="question"></div>
<div>
<button class="compare-btn" onclick="checkCompare('>')">></button>
<button class="compare-btn" onclick="checkCompare('<')"><</button>
<button class="compare-btn" onclick="checkCompare('=')">=</button>
</div>
</div>

<div class="card">
<h3>➕ Cộng Trừ (0-20)</h3>
<div id="mathQuestion" class="question"></div>
<div id="mathOptions"></div>
</div>

</div>

<script>
let score=0;const scoreEl=document.getElementById('score');
function addScore(){score++;scoreEl.innerText=score;if(score%10===0)fireworks();}
function speak(t){let u=new SpeechSynthesisUtterance(t);u.lang='vi-VN';speechSynthesis.speak(u);} 
function fireworks(){let f=document.getElementById('fireworks');f.style.display='block';setTimeout(()=>f.style.display движения;},1500);} 

// ===== TẬP ĐẾM =====
const countQ=document.getElementById('countQuestion');
const countOpt=document.getElementById('countOptions');
let correctCount;
function newCount(){
 correctCount=Math.floor(Math.random()*9)+1;
 let emoji=['🚗','🍎','🐶','⭐','🎈'][Math.floor(Math.random()*5)];
 countQ.innerHTML=(emoji.repeat(correctCount));
 speak('Có bao nhiêu?');
 generateCountOptions();
}
function generateCountOptions(){
 countOpt.innerHTML='';
 for(let i=0;i<4;i++){
  let num=Math.floor(Math.random()*10);
  let btn=document.createElement('button');
  btn.className='option';btn.innerText=num;
  btn.onclick=function(){
   if(num===correctCount){btn.classList.add('correct');addScore();speak('Giỏi lắm');setTimeout(newCount,800);} 
   else{btn.classList.add('wrong');speak('Thử lại nhé');setTimeout(()=>btn.classList.remove('wrong'),500);} };
  countOpt.appendChild(btn);
 }
}
newCount();

// ===== SO SÁNH =====
let a,b,correctCompare;
const compareQ=document.getElementById('compareQuestion');
function newCompare(){
 a=Math.floor(Math.random()*50);
 b=Math.floor(Math.random()*50);
 compareQ.innerText=a+' ? '+b;
 speak('So sánh '+a+' và '+b);
 if(a>b)correctCompare='>';
 else if(a<b)correctCompare='<';
 else correctCompare='=';
}
function checkCompare(ans){
 if(ans===correctCompare){addScore();speak('Chính xác');newCompare();}
 else{speak('Sai rồi');}
}
newCompare();

// ===== CỘNG TRỪ =====
const mathQ=document.getElementById('mathQuestion');
const mathOpt=document.getElementById('mathOptions');
let correctMath;
function newMath(){
 let x=Math.floor(Math.random()*11);
 let y=Math.floor(Math.random()*11);
 if(Math.random()>0.5){correctMath=x+y;mathQ.innerText=x+' + '+y+' = ?';}
 else{if(x<y){let t=x;x=y;y=t;}correctMath=x-y;mathQ.innerText=x+' - '+y+' = ?';}
 speak(mathQ.innerText);
 generateMathOptions();
}
function generateMathOptions(){
 mathOpt.innerHTML='';
 for(let i=0;i<4;i++){
  let num=Math.floor(Math.random()*21);
  let btn=document.createElement('button');
  btn.className='option';btn.innerText=num;
  btn.onclick=function(){
   if(num===correctMath){btn.classList.add('correct');addScore();speak('Đúng rồi');setTimeout(newMath,800);} 
   else{btn.classList.add('wrong');speak('Sai rồi');setTimeout(()=>btn.classList.remove('wrong'),500);} };
  mathOpt.appendChild(btn);
 }
}
newMath();
</script>
</body>
</html>
