<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<title>bé dương bảo khánh</title>

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Be Vietnam Pro',sans-serif;
background:#f5a3a3;
text-align:center;
margin:0;
}

h1{
font-size:42px;
margin-top:20px;
font-weight:600;
}

#score{
font-size:24px;
margin:10px;
}

.menu{
background:white;
width:80%;
margin:auto;
padding:30px;
border-radius:25px;
}

button{
font-family:'Be Vietnam Pro';
font-size:26px;
padding:16px 24px;
margin:10px;
border:none;
border-radius:16px;
background:#6b63ff;
color:white;
cursor:pointer;
}

button:hover{
background:#554de0;
}

#game{
margin-top:30px;
}

.question{
font-size:40px;
margin:20px;
}

.option{
display:inline-flex;
align-items:center;
justify-content:center;
font-size:48px;
width:110px;
height:110px;
background:white;
border-radius:20px;
margin:12px;
cursor:pointer;
box-shadow:0 4px 8px rgba(0,0,0,0.2);
}

.option:hover{
background:#f2f2ff;
}

.star{
font-size:150px;
color:gold;
display:none;
margin-top:30px;
}

</style>
</head>

<body>

<h1>bé dương bảo khánh</h1>

<div id="score">⭐ điểm: 0</div>

<div class="menu">

<button onclick="startAnimal()">đếm con vật</button>
<button onclick="startSpell()">đánh vần</button>
<button onclick="startMissing()">chữ còn thiếu</button>
<button onclick="startLetter()">nhận diện chữ</button>

</div>

<div id="game"></div>

<div class="star" id="star">⭐</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3e7d6e9f5e.mp3">
</audio>

<script>

let score=0
let streak=0

const animals=["🐱","🐶","🐟","🐔","🚗"]

const letters=[
"a","ă","â","b","c","d","đ","e","ê",
"g","h","i","k","l","m","n",
"o","ô","ơ",
"p","q","r","s","t",
"u","ư",
"v","x","y"
]

const words=[
"ba","bà","bé","bò","cá","cô","cờ","mẹ","xe",
"gà","mèo","cua","sò","tô","bê","cò","bơ","dê"
]

function speak(text){

speechSynthesis.cancel()

let msg=new SpeechSynthesisUtterance(text)

msg.lang="vi-VN"

speechSynthesis.speak(msg)

}

function updateScore(){
document.getElementById("score").innerText="⭐ điểm: "+score
}

function correct(){

score++
streak++

updateScore()

if(streak>=5){
showStar()
streak=0
return
}

next()

}

function wrong(){
streak=0
next()
}

function showStar(){

let star=document.getElementById("star")

star.style.display="block"

speak("giỏi lắm bảo khánh")

setTimeout(()=>{
star.style.display="none"
next()
},3500)

}

function random(a){
return a[Math.floor(Math.random()*a.length)]
}

function next(){

setTimeout(()=>{
currentGame()
},600)

}

let currentGame

function startAnimal(){

currentGame=startAnimal

let game=document.getElementById("game")

let animal=random(animals)

let count=Math.floor(Math.random()*4)+1

let html="<div class='question'>"

for(let i=0;i<count;i++) html+=animal+" "

html+="</div>"

for(let i=1;i<=5;i++){

html+="<div class='option' onclick='answerAnimal("+i+","+count+")'>"+i+"</div>"

}

game.innerHTML=html

speak("có bao nhiêu")

}

function answerAnimal(a,b){

if(a==b){
correct()
}else{
wrong()
}

}

function startSpell(){

currentGame=startSpell

let game=document.getElementById("game")

let word=random(words)

let answers=[word]

while(answers.length<3){

let w=random(words)

if(!answers.includes(w)) answers.push(w)

}

answers.sort(()=>Math.random()-0.5)

let html="<div class='question'>nghe và chọn</div>"

answers.forEach(a=>{

html+="<div class='option' onclick='answerSpell(\""+a+"\",\""+word+"\")'>"+a+"</div>"

})

game.innerHTML=html

speak(word)

}

function answerSpell(a,b){

if(a==b){
correct()
}else{
wrong()
}

}

function startMissing(){

currentGame=startMissing

let game=document.getElementById("game")

let word=random(words)

let missing=word[1]

let show=word[0]+" _"

let answers=[missing]

while(answers.length<3){

let l=random(letters)

if(!answers.includes(l)) answers.push(l)

}

answers.sort(()=>Math.random()-0.5)

let html="<div class='question'>"+show+"</div>"

answers.forEach(a=>{

html+="<div class='option' onclick='answerMissing(\""+a+"\",\""+missing+"\")'>"+a+"</div>"

})

game.innerHTML=html

speak(word)

}

function answerMissing(a,b){

if(a==b){
correct()
}else{
wrong()
}

}

function startLetter(){

currentGame=startLetter

let game=document.getElementById("game")

let letter=random(letters)

let answers=[letter]

while(answers.length<4){

let l=random(letters)

if(!answers.includes(l)) answers.push(l)

}

answers.sort(()=>Math.random()-0.5)

let html=""

answers.forEach(a=>{

html+="<div class='option' onclick='answerLetter(\""+a+"\",\""+letter+"\")'>"+a+"</div>"

})

game.innerHTML=html

speak("đâu là chữ "+letter)

}

function answerLetter(a,b){

if(a==b){
correct()
}else{
wrong()
}

}

window.onload=function(){

speak("chào mừng bé dương bảo khánh")

let music=document.getElementById("music")

setTimeout(()=>{

music.volume=0.12

music.play()

},2000)

}

</script>

</body>
</html>
