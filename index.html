<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bé Bảo Khánh Học Bài</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#6a5af9,#2ec9b0);
text-align:center;
margin:0;
padding:20px;
color:white;
}

.title{
font-size:34px;
font-weight:bold;
margin-bottom:10px;
}

.score{
font-size:20px;
background:white;
color:black;
padding:10px 20px;
border-radius:20px;
display:inline-block;
}

.card{
background:white;
color:black;
margin-top:25px;
padding:25px;
border-radius:25px;
max-width:500px;
margin-left:auto;
margin-right:auto;
}

.question{
font-size:28px;
margin-bottom:20px;
}

button{
font-size:22px;
padding:15px 25px;
margin:10px;
border:none;
border-radius:15px;
background:#ff6b9a;
color:white;
cursor:pointer;
}

button:hover{
background:#ff4c82;
}

.emoji{
font-size:50px;
margin-bottom:15px;
}

.menu button{
background:#6a5af9;
}

</style>
</head>

<body>

<div class="title">🎓 Bé Dương Bảo Khánh Học Bài</div>

<div class="score">
⭐ Điểm: <span id="score">0</span>
</div>

<div class="card">

<div class="menu" id="menu">

<button onclick="startAnimal()">🐶 Đếm con vật</button>

<button onclick="startMath()">➕ Toán học</button>

<button onclick="startCompare()">🔢 So sánh</button>

<button onclick="startAlphabet()">🔤 Học chữ</button>

<button onclick="startPuzzle()">🧠 Ghép hình</button>

</div>

<div id="game"></div>

</div>

<script>

let score=0

function updateScore(){
document.getElementById("score").innerText=score
}

function speak(text){

speechSynthesis.cancel()

let msg=new SpeechSynthesisUtterance(text)

msg.lang="vi-VN"

msg.rate=0.9

speechSynthesis.speak(msg)

}

function clap(){

let audio=new Audio("https://www.soundjay.com/human/applause-8.mp3")

audio.play()

}

function firework(){

for(let i=0;i<20;i++){

let div=document.createElement("div")

div.innerHTML="🎉"

div.style.position="fixed"

div.style.left=Math.random()*100+"%"

div.style.top=Math.random()*100+"%"

div.style.fontSize="30px"

document.body.appendChild(div)

setTimeout(()=>div.remove(),1000)

}

}

function praise(){

let praises=[
"Con giỏi quá",
"Bảo Khánh giỏi quá",
"Giỏi lắm",
"Tuyệt vời",
"Chính xác"
]

let say=praises[Math.floor(Math.random()*praises.length)]

speak(say)

}

function correct(){

praise()

score++

updateScore()

clap()

firework()

setTimeout(()=>location.reload(),1500)

}

function wrong(){

speak("Sai rồi, thử lại con nhé")

}

function startAnimal(){

let number=Math.floor(Math.random()*5)+1

let animals=["🐶","🐱","🐰","🐼"]

let animal=animals[Math.floor(Math.random()*animals.length)]

let html=""

for(let i=0;i<number;i++) html+=animal+" "

document.getElementById("game").innerHTML=

`<div class="question">Có bao nhiêu con?</div>
<div class="emoji">${html}</div>
<div>
<button onclick="check(${number},${number})">${number}</button>
<button onclick="check(${number+1},${number})">${number+1}</button>
<button onclick="check(${number-1},${number})">${number-1}</button>
</div>`

speak("Có bao nhiêu con")

}

function startMath(){

let a=Math.floor(Math.random()*10)

let b=Math.floor(Math.random()*10)

let correctAns=a+b

document.getElementById("game").innerHTML=

`<div class="question">Tính phép cộng</div>
<div class="emoji">${a} + ${b}</div>
<div>
<button onclick="check(${correctAns},${correctAns})">${correctAns}</button>
<button onclick="check(${correctAns+1},${correctAns})">${correctAns+1}</button>
<button onclick="check(${correctAns-1},${correctAns})">${correctAns-1}</button>
</div>`

speak(a+" cộng "+b+" bằng bao nhiêu")

}

function startCompare(){

let a=Math.floor(Math.random()*10)

let b=Math.floor(Math.random()*10)

document.getElementById("game").innerHTML=

`<div class="question">Chọn dấu đúng</div>
<div class="emoji">${a} ? ${b}</div>
<div>
<button onclick="checkSign('>',${a},${b})">></button>
<button onclick="checkSign('<',${a},${b})"><</button>
<button onclick="checkSign('=',${a},${b})">=</button>
</div>`

speak("So sánh hai số")

}

function startAlphabet(){

let letters=["a","ă","â","b","c","d","đ","e","ê"]

let letter=letters[Math.floor(Math.random()*letters.length)]

document.getElementById("game").innerHTML=

`<div class="question">Chọn chữ đúng</div>
<div class="emoji">${letter.toUpperCase()}</div>
<div>
<button onclick="checkLetter('${letter}','${letter}')">${letter}</button>
<button onclick="checkLetter('o','${letter}')">o</button>
<button onclick="checkLetter('u','${letter}')">u</button>
</div>`

speak("Chữ "+letter)

}

function startPuzzle(){

let animals=["🐶","🐱","🐰"]

let a=animals[Math.floor(Math.random()*animals.length)]

let b=animals[Math.floor(Math.random()*animals.length)]

document.getElementById("game").innerHTML=

`<div class="question">Chọn hình giống nhau</div>
<div class="emoji">${a} ?</div>
<div>
<button onclick="check('${a}','${a}')">${a}</button>
<button onclick="check('${b}','${a}')">${b}</button>
<button onclick="check('🐼','${a}')">🐼</button>
</div>`

speak("Chọn hình giống nhau")

}

function check(ans,correctAns){

if(ans==correctAns) correct()
else wrong()

}

function checkLetter(ans,correctAns){

if(ans==correctAns) correct()
else wrong()

}

function checkSign(sign,a,b){

let correct="="

if(a>b) correct=">"
if(a<b) correct="<"

if(sign==correct) correct()
else wrong()

}

</script>

</body>
</html>
