<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Học cùng Bảo Khánh</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;margin:0;background:linear-gradient(135deg,#6a8dff,#00c9a7);color:#333}
.container{max-width:500px;margin:auto;padding:15px}
.card{background:white;border-radius:20px;padding:20px;margin-bottom:20px;box-shadow:0 8px 20px rgba(0,0,0,0.15);text-align:center}
button{padding:12px 18px;margin:8px;border:none;border-radius:12px;font-size:18px;cursor:pointer;background:#ff7aa2;color:white}
button:hover{opacity:0.85}
.choice{display:inline-block;margin:5px}
.big{font-size:28px;margin:15px}
.hidden{display:none}
.header{color:white;text-align:center;padding:25px 10px}
.score{background:white;color:#333;display:inline-block;padding:10px 20px;border-radius:30px;font-size:18px}
.firework{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;font-size:40px;display:flex;align-items:center;justify-content:center;animation:boom 1s ease-out}
@keyframes boom{0%{transform:scale(0.3);opacity:1}100%{transform:scale(2);opacity:0}}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>Chào mừng bé Dương Bảo Khánh 💙</h1>
<div class="score">⭐ Điểm: <span id="score">0</span></div>
</div>

<div class="card">
<button onclick="startCounting()">🚗 Tập Đếm</button>
<button onclick="startCompare()">🔢 So Sánh > < =</button>
<button onclick="startMath()">➕ Cộng Trừ (0-20)</button>
</div>

<div id="game" class="card hidden"></div>
</div>

<script>
let score=0;
function speak(text){let msg=new SpeechSynthesisUtterance(text);msg.lang='vi-VN';speechSynthesis.speak(msg)}
function addScore(){score++;document.getElementById('score').innerText=score;if(score%5===0)firework()}
function firework(){let fw=document.createElement('div');fw.className='firework';fw.innerText='🎆';document.body.appendChild(fw);setTimeout(()=>fw.remove(),1000)}

function startCounting(){let num=Math.floor(Math.random()*10)+1;let game=document.getElementById('game');game.classList.remove('hidden');let emojis='🚗'.repeat(num);let options=[num,num+1,num-1].sort(()=>Math.random()-0.5);
 game.innerHTML=`<div class='big'>${emojis}</div><div> Có bao nhiêu chiếc xe? </div>`;
 speak('Có bao nhiêu chiếc xe?');
 options.forEach(o=>{
 let btn=document.createElement('button');btn.innerText=o;btn.onclick=function(){if(o===num){addScore();alert('Giỏi lắm!')}else alert('Sai rồi!');startCounting()};
 game.appendChild(btn);
 })}

function startCompare(){let a=Math.floor(Math.random()*50);let b=Math.floor(Math.random()*50);let game=document.getElementById('game');game.classList.remove('hidden');game.innerHTML=`<div class='big'>${a} ? ${b}</div><div>Chọn dấu đúng</div>`;
 speak(`So sánh ${a} và ${b}`);
 ['>','<','='].forEach(sign=>{
 let btn=document.createElement('button');btn.innerText=sign;btn.onclick=function(){if((a>b&&sign==='>')||(a<b&&sign==='<')||(a===b&&sign==='=')){addScore();alert('Đúng rồi!')}else alert('Sai rồi!');startCompare()};
 game.appendChild(btn);
 })}

function startMath(){let a=Math.floor(Math.random()*20);let b=Math.floor(Math.random()*20);let isPlus=Math.random()>0.5;let correct=isPlus?a+b:a-b;if(correct<0||correct>20){startMath();return}
 let game=document.getElementById('game');game.classList.remove('hidden');game.innerHTML=`<div class='big'>${a} ${isPlus?'+':'-'} ${b} = ?</div>`;
 speak(`${a} ${isPlus?'cộng':'trừ'} ${b} bằng bao nhiêu`);
 let options=[correct,correct+1,correct-1].sort(()=>Math.random()-0.5);
 options.forEach(o=>{
 let btn=document.createElement('button');btn.innerText=o;btn.onclick=function(){if(o===correct){addScore();alert('Chính xác!')}else alert('Chưa đúng!');startMath()};
 game.appendChild(btn);
 })}
</script>
</body>
</html>
